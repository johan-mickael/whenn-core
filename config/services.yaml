# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: "../src/"
        exclude:
            - "../src/Domain/**/*RepositoryInterface.php"
            - "../src/Domain/Common/TransactionManagerInterface.php"
            - "../src/Kernel.php"

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Infrastructure\Http\Listener\DomainExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception }

    # Bind domain repository interfaces to Doctrine implementations
    App\Domain\Tenant\TenantRepositoryInterface:
        class: App\Infrastructure\Persistence\Repository\Tenant\DoctrineTenantRepository

    App\Domain\User\UserRepositoryInterface:
        class: App\Infrastructure\Persistence\Repository\User\DoctrineUserRepository

    App\Domain\Event\EventRepositoryInterface:
        class: App\Infrastructure\Persistence\Repository\Event\DoctrineEventRepository

    App\Domain\Order\OrderRepositoryInterface:
        class: App\Infrastructure\Persistence\Repository\Order\DoctrineOrderRepository

    App\Domain\Venue\VenueRepositoryInterface:
        class: App\Infrastructure\Persistence\Repository\Venue\DoctrineVenueRepository

    App\Domain\Common\TransactionManagerInterface:
        class: App\Infrastructure\Persistence\DoctrineTransactionManager

when@test:
    services:
        App\Tests\Fixture\:
            resource: '../tests/Fixture/'
            tags: ['doctrine.fixture.orm']
            autowire: true
            autoconfigure: true
